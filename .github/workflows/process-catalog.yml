name: Process catalog discovery

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

concurrency:
  group: process-ingestion-catalog
  cancel-in-progress: false

jobs:
  process-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RUN_CRON_SCHEDULER: 'false'
      INGESTION_ALLOWED_JOB_TYPES: 'DISCOVER,CATALOG_REFRESH'
      TMDB_REQUESTS_PER_SECOND: '8'
      TMDB_MAX_429_BACKOFF_SECONDS: '300'
      INGESTION_POLL_INTERVAL_MS: '5000'
      INGESTION_MAX_JOBS_PER_TICK: '1'
      INGESTION_STALE_RECOVERY_MINUTES: '15'
      INGESTION_STALE_RECOVERY_INTERVAL_MS: '60000'
      INGESTION_MIN_RELEASE_YEAR: '2010'
      INGESTION_LANGUAGE_MODE: weighted
      INGESTION_LANGUAGE_WEIGHTS: 'hi:100,en:20,ta:15,te:15,ml:10'
      INGESTION_FALLBACK_TO_GLOBAL: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Run catalog worker burst
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: timeout 1800 npm run start:worker || test $? -eq 124
