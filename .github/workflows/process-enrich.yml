name: Process OMDb enrichment

on:
  schedule:
    - cron: '30 4,16 * * *'
  workflow_dispatch:

concurrency:
  group: process-ingestion-enrich
  cancel-in-progress: false

jobs:
  process-enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUN_CRON_SCHEDULER: 'false'
      INGESTION_ALLOWED_JOB_TYPES: 'DEEP_ENRICH'
      INGESTION_POLL_INTERVAL_MS: '5000'
      INGESTION_MAX_JOBS_PER_TICK: '3'
      INGESTION_STALE_RECOVERY_MINUTES: '15'
      INGESTION_STALE_RECOVERY_INTERVAL_MS: '60000'
      INGESTION_OMDB_DAILY_LIMIT: '200'
      INGESTION_OMDB_RETRY_RESERVE: '50'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Run enrichment worker burst
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: timeout 600 npm run start:worker || test $? -eq 124
